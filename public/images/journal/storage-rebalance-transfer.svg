    <g fill="#38bdf8"><circle cx="63" cy="46" r="5"/><circle cx="63" cy="105" r="5"/><circle cx="63" cy="164" r="5"/><circle cx="63" cy="223" r="5"/></g>
    <rect x="72" y="46" width="95" height="5" rx="2" fill="#64748b"/><rect x="72" y="105" width="95" height="5" rx="2" fill="#64748b"/><rect x="72" y="164" width="95" height="5" rx="2" fill="#64748b"/>
