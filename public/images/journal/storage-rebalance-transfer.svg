    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#8a552f"/><stop offset="1" stop-color="#6b3f24"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#wall)"/>
  <rect y="520" width="1200" height="155" fill="url(#desk)"/>
  <rect x="0" y="0" width="1200" height="675" fill="none" stroke="#0f172a" stroke-width="16"/>

