<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A very long homelab hard-drive transfer</title>
  <desc id="desc">Humorous cartoon of a tired homelab owner waiting while an old hard drive slowly transfers media files to a replacement 4TB drive.</desc>
