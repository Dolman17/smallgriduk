  <text x="470" y="934" font-family="Inter, sans-serif" font-size="18" fill="#6B737B">Readable body copy for tutorials, documentation, and long-form guidance.</text>

  <text x="950" y="816" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="800" fill="#0E3D39" letter-spacing="2">BRAND IN A LINE</text>
