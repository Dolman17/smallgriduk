  <text x="64" y="188" font-family="Inter, sans-serif" font-size="24" font-weight="500" fill="#34434A">Practical tools and clear guidance for building reliable, well-structured systems.</text>
  <text x="650" y="92" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="26" font-weight="750" fill="#0E3D39">Small, useful systems.</text>
  <text x="650" y="128" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="26" font-weight="750" fill="#0E3D39">Clear technical guidance.</text>

  <line x1="64" y1="236" x2="1376" y2="236" stroke="#D8DEE3" />
