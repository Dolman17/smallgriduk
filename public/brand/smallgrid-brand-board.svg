  <text x="1040" y="864" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="28" font-weight="800" fill="#0E3D39">Small, useful systems.</text>
  <text x="1040" y="904" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="28" font-weight="800" fill="#0E3D39">Clear technical guidance.</text>
  <text x="1040" y="944" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#34434A">Tiny tools. Solid systems.</text>
