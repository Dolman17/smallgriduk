<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" fill="none" role="img" aria-label="SmallGrid.uk brand board">
  <rect width="1440" height="1080" rx="18" fill="#F2F4F5" />
  <rect x="32" y="32" width="1376" height="1016" rx="22" fill="#FFFFFF" stroke="#D8DEE3" />

  <text x="64" y="118" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="70" font-weight="800" fill="#0E3D39" letter-spacing="-2">SmallGrid</text>
