  <text x="330" y="868" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#34434A">Body</text>
  <text x="330" y="898" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0E3D39">Inter</text>
